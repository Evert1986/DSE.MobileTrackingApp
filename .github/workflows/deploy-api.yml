name: Deploy DSE Mobile Tracking API

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: YOUR-AZURE-WEBAPP-NAME
  PROJECT_PATH: DSE.MobileTracking.Api/DSE.MobileTracking.Api.csproj
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Build API
        run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish "${{ env.PROJECT_PATH }}" --configuration Release --no-build --output "${{ github.workspace }}\publish"

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}\publish
